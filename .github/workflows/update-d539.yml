name: Update d539 data

on:
  workflow_dispatch:
  schedule:
    - cron: '45 12,13 * * 1-6'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Update latest d539 JSON
        run: node ./scripts/update-d539-latest.mjs

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/d539-latest.json
          git diff --cached --quiet && exit 0
          git commit -m "Update latest d539 data"
          git push
